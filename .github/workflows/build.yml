name: 🏗️ Build Kernel (s5e8535 / M14 with ReSukiSU + SuSFS)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build:
    name: 🏗️ Build Kernel (s5e8535 / M14)
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      # ──────────────────────────────────────────────
      # 1. Checkout kernel source
      # ──────────────────────────────────────────────
      - name: 📥 Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MrPankaj24/timepass-work
          ref: main
          fetch-depth: 1
          submodules: 'recursive'  # <--- THIS TELLS GITHUB TO DOWNLOAD RESUKISU

      # ──────────────────────────────────────────────
      # 2. Install dependencies
      # ──────────────────────────────────────────────
      - name: 📦 Install Build Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git curl wget \
            bc bison flex \
            libssl-dev libelf-dev \
            python3 python-is-python3 \
            make gcc gcc-aarch64-linux-gnu \
            binutils binutils-aarch64-linux-gnu \
            g++ cpio zip unzip \
            lz4 zstd xz-utils \
            libncurses-dev libncurses5-dev \
            kmod rsync \
            lld llvm clang \
            dwarves pahole \
            ccache \
            device-tree-compiler \
            zlib1g-dev libc6-dev-i386 \
            cmake ninja-build

      # ──────────────────────────────────────────────
      # 3. Cache toolchains to speed up re-runs
      # ──────────────────────────────────────────────
      - name: 🔧 Cache Toolchains
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            toolchain/clang/host/linux-x86/clang-r450784d
            toolchain/build/kernel/build-tools
            toolchain/prebuilts/kernel-build-tools
          key: toolchain-clang-r450784d-kernel-build-tools-v3

      # ──────────────────────────────────────────────
      # 4. Download Clang
      # ──────────────────────────────────────────────
      - name: ⬇️ Download Clang r450784d
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchain/clang/host/linux-x86/clang-r450784d
          echo "Downloading Clang r450784d from AOSP..."
          curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android13-release/clang-r450784d.tar.gz" -o /tmp/clang.tar.gz
          tar -xzf /tmp/clang.tar.gz -C toolchain/clang/host/linux-x86/clang-r450784d
          rm /tmp/clang.tar.gz

      # ──────────────────────────────────────────────
      # 5. Download Kernel Build Tools
      # ──────────────────────────────────────────────
      - name: ⬇️ Download Kernel Build Tools
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 -b main https://android.googlesource.com/kernel/prebuilts/build-tools toolchain/build/kernel/build-tools
          mkdir -p toolchain/build/kernel/build-tools/path
          ln -sf $(pwd)/toolchain/build/kernel/build-tools/linux-x86 toolchain/build/kernel/build-tools/path/linux-x86
          ln -sf $(pwd)/toolchain/build/kernel/build-tools/sysroots/x86_64-unknown-linux-musl toolchain/build/kernel/build-tools/sysroot

      # ──────────────────────────────────────────────
      # 6. Download Kernel Prebuilt Tools
      # ──────────────────────────────────────────────
      - name: ⬇️ Download Kernel Prebuilt Tools
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://android.googlesource.com/kernel/prebuilts/build-tools toolchain/prebuilts/kernel-build-tools

      # ──────────────────────────────────────────────
      # 7. Build the Kernel
      # ──────────────────────────────────────────────
      - name: 🔨 Build Kernel
        run: |
          set -e

          # ── Set up toolchain PATHs ──
          export PATH=$(pwd)/toolchain/clang/host/linux-x86/clang-r450784d/bin:$PATH
          export PATH=$(pwd)/toolchain/build/kernel/build-tools/path/linux-x86/:$PATH

          export HOSTCFLAGS="-I$(pwd)/toolchain/prebuilts/kernel-build-tools/linux-x86/include"
          export HOSTLDFLAGS="-Wl,-rpath,$(pwd)/toolchain/prebuilts/kernel-build-tools/linux-x86/lib64 -L$(pwd)/toolchain/prebuilts/kernel-build-tools/linux-x86/lib64 -fuse-ld=lld --rtlib=compiler-rt"

          export PLATFORM_VERSION=15
          export ANDROID_MAJOR_VERSION=v
          export ARCH=arm64
          export TARGET_SOC=s5e8535

          # ── Step 1: Generate .config ──
          echo ">>> Generating base defconfig..."
          make ARCH=arm64 LLVM=1 LLVM_IAS=1 HOSTCC=clang HOSTCXX=clang++ s5e8535-m14xnsxx_defconfig

          # ── Step 2: Build kernel with Clang flags ──
          echo ">>> Building kernel with $(nproc) jobs..."
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 HOSTCC=clang HOSTCXX=clang++ 2>&1 | tee /tmp/kernel_build.log

      # ──────────────────────────────────────────────
      # 8. Collect build artifacts
      # ──────────────────────────────────────────────
      - name: 📦 Collect Kernel Artifacts
        if: success()
        run: |
          mkdir -p out/kernel
          if [ -f arch/arm64/boot/Image ]; then cp arch/arm64/boot/Image out/kernel/; fi
          if [ -f arch/arm64/boot/Image.gz ]; then cp arch/arm64/boot/Image.gz out/kernel/; fi
          if [ -d arch/arm64/boot/dts/exynos ]; then
            mkdir -p out/dtbs
            find arch/arm64/boot/dts/exynos -name "*.dtb" | grep -i "s5e8535\|m14" | xargs -I{} cp {} out/dtbs/ 2>/dev/null || true
          fi

      # ──────────────────────────────────────────────
      # 9. Upload artifacts
      # ──────────────────────────────────────────────
      - name: ⬆️ Upload Kernel Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-s5e8535-m14-resukisu-susfs
          path: out/
          if-no-files-found: warn
          retention-days: 30

      # ──────────────────────────────────────────────
      # 10. Upload build log on failure for debugging
      # ──────────────────────────────────────────────
      - name: ⬆️ Upload Build Log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failure
          path: /tmp/kernel_build.log
          if-no-files-found: ignore
          retention-days: 7
