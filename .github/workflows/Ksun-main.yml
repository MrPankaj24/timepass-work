name: 🏗️ Build Kernel (s5e8535 test / M14)

on:
#  push:
#    branches: [ main ]
#  pull_request:
#    branches: [ main ]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build:
    name: 🏗️ Build Kernel (s5e8535 / M14)
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      # ──────────────────────────────────────────────
      # 1. Checkout kernel source
      # ──────────────────────────────────────────────
      - name: 📥 Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MrPankaj24/SM-M146B-Kernel-Source
          ref: main
          fetch-depth: 1

      # ──────────────────────────────────────────────
      # 2. Install dependencies
      # ──────────────────────────────────────────────
      - name: 📦 Install Build Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git curl wget \
            bc bison flex \
            libssl-dev libelf-dev \
            python3 python-is-python3 \
            make gcc gcc-aarch64-linux-gnu \
            binutils binutils-aarch64-linux-gnu \
            g++ cpio zip unzip \
            lz4 zstd xz-utils \
            libncurses-dev libncurses5-dev \
            kmod rsync \
            lld llvm clang \
            dwarves pahole \
            ccache \
            device-tree-compiler \
            zlib1g-dev libc6-dev-i386 \
            cmake ninja-build

      # ──────────────────────────────────────────────
      # 3. Cache toolchains to speed up re-runs
      # ──────────────────────────────────────────────
      - name: 🔧 Cache Toolchains
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            toolchain/clang/host/linux-x86/clang-r450784d
            toolchain/build/kernel/build-tools
            toolchain/prebuilts/kernel-build-tools
          key: toolchain-clang-r450784d-kernel-build-tools-v3

      # ──────────────────────────��───────────────────
      # 4. Download Clang (only if not cached)
      # ──────────────────────────────────────────────
      - name: ⬇️ Download Clang r450784d
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchain/clang/host/linux-x86/clang-r450784d

          echo "Downloading Clang r450784d from AOSP..."
          curl -L \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android13-release/clang-r450784d.tar.gz" \
            -o /tmp/clang.tar.gz

          tar -xzf /tmp/clang.tar.gz -C toolchain/clang/host/linux-x86/clang-r450784d
          rm /tmp/clang.tar.gz

          echo "✅ Clang version:"
          toolchain/clang/host/linux-x86/clang-r450784d/bin/clang --version

      # ──────────────────────────────────────────────
      # 5. Download Kernel Build Tools (only if not cached)
      # ──────────────────────────────────────────────
      - name: ⬇️ Download Kernel Build Tools
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          echo "Cloning kernel/prebuilts/build-tools..."
          git clone --depth=1 -b main \
            https://android.googlesource.com/kernel/prebuilts/build-tools \
            toolchain/build/kernel/build-tools

          # Create symlinks that the build expects
          mkdir -p toolchain/build/kernel/build-tools/path
          ln -sf $(pwd)/toolchain/build/kernel/build-tools/linux-x86 \
            toolchain/build/kernel/build-tools/path/linux-x86
          ln -sf $(pwd)/toolchain/build/kernel/build-tools/sysroots/x86_64-unknown-linux-musl \
            toolchain/build/kernel/build-tools/sysroot

          echo "✅ Build tools downloaded"

      # ──────────────────────────────────────────────
      # 6. Download Kernel Prebuilt Tools (only if not cached)
      # ──────────────────────────────────────────────
      - name: ⬇️ Download Kernel Prebuilt Tools
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          echo "Cloning kernel/prebuilts/build-tools for pahole/BTF support..."
          git clone --depth=1 \
            https://android.googlesource.com/kernel/prebuilts/build-tools \
            toolchain/prebuilts/kernel-build-tools

          echo "✅ Kernel prebuilt tools downloaded"

      # ──────────────────────────────────────────────
      # 7. Verify toolchain
      # ──────────────────────────────────────────────
      - name: 🔍 Verify Toolchain
        run: |
          echo "=== Clang ==="
          toolchain/clang/host/linux-x86/clang-r450784d/bin/clang --version

          echo "=== System Cross GCC (fallback) ==="
          aarch64-linux-gnu-gcc --version || echo "Not available"

          echo "=== pahole ==="
          pahole --version

          echo "=== Python ==="
          python3 --version

          echo "=== Make ==="
          make --version | head -1

          echo "=== Available defconfigs for device ==="
          ls arch/arm64/configs/ | grep -i "s5e\|m14\|8535"

      # ──────────────────────────────────────────────
      # 8. Build the Kernel
      # ──────────────────────────────────────────────
      - name: 🔨 Build Kernel
        run: |
          set -e

          # ── Set up toolchain PATHs ──
          export PATH=$(pwd)/toolchain/clang/host/linux-x86/clang-r450784d/bin:$PATH
          export PATH=$(pwd)/toolchain/build/kernel/build-tools/path/linux-x86/:$PATH

          # ── Host build flags (use system glibc, not musl sysroot) ──
          export HOSTCFLAGS="-I$(pwd)/toolchain/prebuilts/kernel-build-tools/linux-x86/include"
          export HOSTLDFLAGS="-Wl,-rpath,$(pwd)/toolchain/prebuilts/kernel-build-tools/linux-x86/lib64 \
            -L$(pwd)/toolchain/prebuilts/kernel-build-tools/linux-x86/lib64 \
            -fuse-ld=lld --rtlib=compiler-rt"

          # ── Kernel build environment ──
          export DTC_FLAGS="-@"
          export PLATFORM_VERSION=15
          export ANDROID_MAJOR_VERSION=v
          export LLVM=1
          export DEPMOD=depmod
          export ARCH=arm64
          export TARGET_SOC=s5e8535

          echo "PLATFORM_VERSION = $PLATFORM_VERSION"
          echo "ANDROID_MAJOR_VERSION = $ANDROID_MAJOR_VERSION"
          echo "ARCH = $ARCH"

          # ── Step 1: Generate .config from defconfig ──
          echo ">>> Generating defconfig..."
          make s5e8535-m14xnsxx_defconfig

          # ── Step 2: Inject Custom Configs ──
          echo ">>> Injecting KSU, SUSFS, and Network configs..."
          cat >> .config <<'EOF'
          # [base]
          CONFIG_KSU=y
          CONFIG_IP_NF_TARGET_TTL=y
          CONFIG_IP6_NF_TARGET_HL=y
          CONFIG_IP6_NF_MATCH_HL=y
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_TCP_CONG_CUBIC=y
          CONFIG_TCP_CONG_BIC=n
          CONFIG_TCP_CONG_WESTWOOD=y
          CONFIG_TCP_CONG_HTCP=y
          CONFIG_IP_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          CONFIG_KALLSYMS=y
          CONFIG_KALLSYMS_ALL=y

          # [susfs]
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_UNICODE_FILTER=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_HIDDEN_NAME=y
          CONFIG_KSU_SUSFS_HARDENED=y

          # [overlayfs]
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          
          # [KSU & Kprobes Dependencies]
          CONFIG_KPROBES=y
          CONFIG_HAVE_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          CONFIG_THREAD_INFO_IN_TASK=y
          
          EOF

          # Clean up any leading spaces created by YAML indentation
          sed -i 's/^[ \t]*//' .config
          
          # ── Step 3: Apply configs and resolve dependencies ──
          echo ">>> Running olddefconfig to apply injected options..."
          make olddefconfig

          # Hard disable BTF again after olddefconfig just to be safe
          sed -i '/CONFIG_DEBUG_INFO_BTF/d' .config
          echo "# CONFIG_DEBUG_INFO_BTF is not set" >> .config

          # ── Step 4: Build kernel ──
          echo ">>> Building kernel with $(nproc) jobs..."
          make -j$(nproc) 2>&1 | tee /tmp/kernel_build.log

          echo "✅ Build completed!"

      # ──────────────────────────────────────────────
      # 9. Collect build artifacts
      # ──────────────────────────────────────────────
      - name: 📦 Collect Kernel Artifacts
        if: success()
        run: |
          mkdir -p out/kernel

          # Copy the kernel image
          if [ -f arch/arm64/boot/Image ]; then
            cp arch/arm64/boot/Image out/kernel/
            echo "✅ Copied Image"
          fi

          if [ -f arch/arm64/boot/Image.gz ]; then
            cp arch/arm64/boot/Image.gz out/kernel/
            echo "✅ Copied Image.gz"
          fi

          # Copy device tree blobs
          if [ -d arch/arm64/boot/dts/exynos ]; then
            mkdir -p out/dtbs
            find arch/arm64/boot/dts/exynos -name "*.dtb" | grep -i "s5e8535\|m14" | \
              xargs -I{} cp {} out/dtbs/ 2>/dev/null || true
            echo "✅ Copied DTBs"
          fi

          echo "=== Build output ==="
          ls -lh out/kernel/ 2>/dev/null || echo "No artifacts found"
          ls -lh out/dtbs/ 2>/dev/null || echo "No DTBs found"

      # ──────────────────────────────────────────────
      # 10. Upload artifacts
      # ──────────────────────────────────────────────
      - name: ⬆️ Upload Kernel Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-s5e8535-m14-android15
          path: out/
          if-no-files-found: warn
          retention-days: 30

      # ──────────────────────────────────────────────
      # 11. Upload build log on failure for debugging
      # ──────────────────────────────────────────────
      - name: ⬆️ Upload Build Log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failure
          path: /tmp/kernel_build.log
          if-no-files-found: ignore
          retention-days: 7
